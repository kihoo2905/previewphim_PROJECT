<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UniCenima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #0a0a0b;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 12px 16px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #0d6efd;
            color: white;
            box-shadow: none;
        }
        .btn-login {
            background: linear-gradient(135deg, #0d6efd 0%, #0043a8 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2 class="fw-bold text-white mb-2">UniCenima</h2>
        <p class="text-white-50 mb-4">Chào mừng Admin quay trở lại</p>
        
        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label text-white-50 small">Email</label>
                <input type="email" class="form-control" id="email" value="admin@gmail.com" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label text-white-50 small">Mật khẩu</label>
                <input type="password" class="form-control" id="password" value="123" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100 mb-3">Đăng nhập</button>
        </form>
        
        <div id="loginMessage" class="small mt-2"></div>
        <a href="index.html" class="text-white-50 text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Quay lại trang chủ</a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('loginMessage');

            messageDiv.innerHTML = '<span class="text-info">Đang xác thực...</span>';

            try {
                const result = await MovieAPI.login(email, password);
                if (result.token) {
                    // Lưu Token và thông tin User
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    
                    messageDiv.innerHTML = '<span class="text-success">Đăng nhập thành công! Đang chuyển hướng...</span>';
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                } else {
                    messageDiv.innerHTML = `<span class="text-danger">${result.message || 'Sai tài khoản hoặc mật khẩu'}</span>`;
                }
            } catch (err) {
                messageDiv.innerHTML = '<span class="text-danger">Lỗi kết nối Server!</span>';
            }
        });
    </script>
</body>
</html>
