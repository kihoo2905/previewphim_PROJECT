<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký — UniCenima</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #ff9800;
            --bg-dark: #0a0a0c;
        }
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 2rem 0;
        }
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 152, 0, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(50px);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.2);
        }
        .btn-primary-custom {
            background: var(--primary);
            border: none;
            color: #000;
            font-weight: 700;
            border-radius: 1rem;
            padding: 0.8rem;
            transition: all 0.3s;
        }
        .btn-primary-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.3);
            background: #ffa726;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="login-card">
        <div class="text-center mb-5">
            <h2 class="font-heading fw-bold mb-2">Create Account</h2>
            <p class="text-white-50">Join the UniCenima community today</p>
        </div>

        <form id="userSignupForm">
            <div class="mb-4">
                <label class="form-label small text-white-50">Full Name</label>
                <input type="text" class="form-control" id="userName" placeholder="John Doe" required>
            </div>
            <div class="mb-4">
                <label class="form-label small text-white-50">Email Address</label>
                <input type="email" class="form-control" id="userEmail" placeholder="name@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small text-white-50">Password</label>
                <input type="password" class="form-control" id="userPassword" placeholder="••••••••" required>
            </div>
            <div class="mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label small text-white-50" for="terms">I agree to the Terms & Conditions</label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 mb-3">Sign Up</button>
            <p class="text-center small text-white-50">Already have an account? <a href="login.html" class="text-decoration-none" style="color: var(--primary);">Log In</a></p>
        </form>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('userSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;

            try {
                const result = await MovieAPI.register(username, email, password);
                if (result.token) {
                    alert('Đăng ký thành công! Chào mừng bạn đến với UniCenima.');
                    // Lưu Token và thông tin User (nếu muốn đăng nhập luôn)
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    
                    window.location.href = 'index.html';
                } else {
                    alert('Lỗi: ' + (result.message || 'Không thể đăng ký'));
                }
            } catch (err) {
                alert('Lỗi kết nối Server!');
            }
        });
    </script>
</body>
</html>
